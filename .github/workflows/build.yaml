name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: twin-server

      - name: Checkout twin-go
        uses: actions/checkout@v4
        with:
          repository: condercx/twin-go
          path: twin-go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: ./twin-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go mod edit -replace github.com/condercx/twin-go=../twin-go
          go mod tidy
          go build -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o twin-server-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: twin-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: twin-server/twin-server-*

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: twin-server-*
          merge-multiple: true

      - name: Generate sha256
        run: |
          cd ./dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS

      - name: Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
